# Build & Push Ralph Sandbox Docker Image
#
# Builds ralph-sandbox:latest and pushes to ACR.
# Triggered weekly, on manual dispatch, and when embedded image files change.

name: Build Sandbox Image

on:
  schedule:
    - cron: '0 3 * * 1' # Weekly, Monday 3:00 AM UTC
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'ralph-sandbox/docker/Dockerfile.sandbox'
      - 'ralph-sandbox/docker/entrypoint.sh'
      - 'ralph-sandbox/config/nuget.config'
      - '.github/workflows/build-sandbox-image.yml'
  pull_request:
    branches: [main]
    paths:
      - 'ralph-sandbox/docker/Dockerfile.sandbox'
      - 'ralph-sandbox/docker/entrypoint.sh'
      - 'ralph-sandbox/config/nuget.config'
      - '.github/workflows/build-sandbox-image.yml'

permissions:
  contents: read

env:
  IMAGE_NAME: ralph-sandbox
  BASE_IMAGE: docker/sandbox-templates:claude-code
  REGISTRY_URI: ${{ secrets.ACR_ADMIN_USER }}.azurecr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Pull base image and extract digest
        id: base
        run: |
          docker pull "${{ env.BASE_IMAGE }}"
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "${{ env.BASE_IMAGE }}" | sed 's/.*@sha256://')
          SHORT_DIGEST=${DIGEST:0:12}
          echo "short_digest=$SHORT_DIGEST" >> "$GITHUB_OUTPUT"

      - name: Docker Login to ACR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY_URI }}
          username: ${{ secrets.ACR_ADMIN_USER }}
          password: ${{ secrets.ACR_ADMIN_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ralph-sandbox/docker/Dockerfile.sandbox
          build-args: SCRIPT_DIR=ralph-sandbox
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY_URI }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY_URI }}/${{ env.IMAGE_NAME }}:${{ steps.base.outputs.short_digest }}
