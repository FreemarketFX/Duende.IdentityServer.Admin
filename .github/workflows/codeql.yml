name: CodeQL

on:
  push:
    branches:
      - main
      - feature/rebase-onto-3.0.0-rc1
  pull_request:
    branches:
      - main
      - feature/rebase-onto-3.0.0-rc1
  schedule:
    - cron: '30 1 * * 1'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language:
          - csharp
          - javascript-typescript

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Setup .NET
        if: matrix.language == 'csharp'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build
        if: matrix.language == 'csharp'
        run: |
          dotnet restore Skoruba.Duende.IdentityServer.Admin.sln
          dotnet build Skoruba.Duende.IdentityServer.Admin.sln --configuration Release --no-restore

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:${{ matrix.language }}
